<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Define a cor da barra de status do topo do celular (Azul SENAI) -->
    <meta name="theme-color" content="#005A9C" />

    <!-- Força o iOS a rodar em tela cheia, escondendo a barra do Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Dá um nome curto para quando o aluno salvar o ícone na tela do celular -->
    <meta name="apple-mobile-web-app-title" content="Point" />
    
    <!-- Ícone da Aba do Navegador -->
    <link rel="icon" type="image/png" href="/icone.png" />
    
    <!-- A REGRA DE OURO PARA RESPONSIVIDADE MOBILE (Sem ela as telas espremem) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Gestão de Ambientes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
